<!DOCTYPE html>
<!-- source for og.png — render at exactly 1200x630 and screenshot. Kept in the repo so the card can be regenerated. -->
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@62..125,100..900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;margin:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{background:#0E2C50;color:#F3F6F9;font-family:"Archivo",sans-serif;position:relative;padding:70px 78px}
  body::before{content:"";position:absolute;inset:0;
    background:
      repeating-linear-gradient(0deg,transparent 0 39px,rgba(243,246,249,.09) 39px 40px),
      repeating-linear-gradient(90deg,transparent 0 39px,rgba(243,246,249,.09) 39px 40px)}
  .eyebrow{position:relative;display:inline-block;font-family:"JetBrains Mono",monospace;font-size:19px;letter-spacing:.2em;
    color:#8FAAC6;text-transform:uppercase;border:1px solid rgba(243,246,249,.25);padding:12px 18px;margin-bottom:40px}
  h1{position:relative;font-variation-settings:"wdth" 68;font-weight:800;text-transform:uppercase;
    font-size:118px;line-height:.94;letter-spacing:.004em}
  .stamp{position:absolute;right:74px;top:216px;transform:rotate(-7deg);
    font-family:"JetBrains Mono",monospace;font-size:21px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;
    color:#FF6A57;border:4px solid #FF6A57;box-shadow:inset 0 0 0 3px #0E2C50,inset 0 0 0 5px #FF6A57;padding:16px 22px}
  .foot{position:absolute;left:78px;right:78px;bottom:58px;display:flex;justify-content:space-between;align-items:center;
    font-family:"JetBrains Mono",monospace;font-size:18px;letter-spacing:.08em;text-transform:uppercase;color:#8FAAC6;
    border:1px solid rgba(243,246,249,.25);padding:16px 20px}
  .foot .url{color:#F3F6F9;font-weight:700}
</style>
</head>
<body>
  <p class="eyebrow">Sandpaper · for repos built with Claude Code</p>
  <h1>Your repo can<br/>explain itself.</h1>
  <div class="stamp">✓ stamped<br/>every session</div>
  <div class="foot"><span class="url">sandpaper.sh</span><span>open source · MIT · zero dependencies</span></div>
</body>
</html>
