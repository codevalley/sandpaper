name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - name: syntax-check every shipped script (zero deps — no bundler to catch this for us)
        run: |
          set -e
          for f in $(git ls-files 'bin/*.js' 'src/*.js'); do node --check "$f"; done
      - run: npm test
      - run: npm run verify-publish
